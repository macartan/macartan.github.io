name: deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1.4'
    - name: Pin Bundler to match Gemfile.lock
      run: |
        gem install bundler -v 2.3.24
    - name: Ensure Gemfile.lock includes Linux platform
      env:
        REPO: ${{ github.repository }}
        BRANCH: ${{ github.ref_name }}
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        bundle _2.3.24_ lock --add-platform x86_64-linux
        # `bundle lock` alone often does not add platform-specific gems (e.g. ffi on Linux).
        # Running install updates Gemfile.lock; we commit that before deploy (which requires a clean tree).
        bundle _2.3.24_ install --jobs 4 --retry 3
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        if ! git diff --quiet -- Gemfile.lock; then
          git add Gemfile.lock
          git commit -m "Regenerate Gemfile.lock for GitHub Actions (add linux platform)"
          git push "https://x-access-token:${TOKEN}@github.com/${REPO}.git" HEAD:${BRANCH}
        fi
    - name: Install deps
      run: |
        npm install -g mermaid.cli
    - name: Install Jekyll and Dependencies
      run: |
        bundle _2.3.24_ install --frozen --jobs 4 --retry 3
        bundle _2.3.24_ exec gem list jekyll  # Verify Jekyll is installed
    - name: Setup deploy options
      id: setup
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        if [[ ${GITHUB_REF} = refs/pull/*/merge ]]; then # pull request
          echo "SRC_BRANCH=${GITHUB_HEAD_REF}" >> $GITHUB_OUTPUT
          echo "NO_PUSH=--no-push" >> $GITHUB_OUTPUT
        elif [[ ${GITHUB_REF} = refs/heads/* ]]; then # branch, e.g. master, source etc
          echo "SRC_BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        fi
        echo "DEPLOY_BRANCH=gh-pages" >> $GITHUB_OUTPUT
    - name: Deploy website 
      run:  yes | bash bin/deploy --verbose ${{ steps.setup.outputs.NO_PUSH }}
                    --src ${{ steps.setup.outputs.SRC_BRANCH }} 
                    --deploy ${{ steps.setup.outputs.DEPLOY_BRANCH }} 
